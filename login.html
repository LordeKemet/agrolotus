
<!DOCTYPE html>
<html lang="pt" >

<head>
  <meta charset="UTF-8">
  <script src="https://cpwebassets.codepen.io/assets/common/stopExecutionOnTimeout-f07739098a39bd4e74ddd974652dac904146f33fdc1ecab356e8c809a05faccb.js"></script>
  <title>Agro Lotus</title>
  <link rel="canonical" href="https://codepen.io/mr-zouraiz123/pen/ZEeKMVP">

  <link rel="stylesheet" href="login.css"> 
</head>

<body translate="no">
  <div class="wrapper">
      <div class="title-text">
        <div class="title login">Entrar</div>
        <div class="title signup">Criar conta</div>
      </div>
      <div class="form-container">
        <div class="slide-controls">
          <input type="radio" name="slide" id="login" checked>
          <input type="radio" name="slide" id="signup">
          <label for="login" class="slide login">Entrar</label>
          <label for="signup" class="slide signup">Criar conta</label>
          <div class="slider-tab"></div>
        </div>
        <div class="form-inner">
          <form action="#" class="login">
            <div class="field">
              <input type="email" placeholder="Exemplo123@gmail.com" required>
            </div>
            <div class="field">
              <input type="password" placeholder="Escolha uma boa senha" required>
            </div>
            <div class="pass-link"><a href="#">Esqueceu-se da senha?</a></div>
            <div class="field btn">
              <div class="btn-layer"></div>
              <input type="submit" value="Login">
            </div>
            <div class="signup-link">Ainda não é um membro? <a href="">Cadastre-se</a></div>
          </form>
          <form action="#" class="signup">
            <div class="field">
              <input type="text" placeholder="Exemplo123@gmail.com" required>
            </div>
            <div class="field">
              <input type="password" placeholder="Escolha uma boa senha" required>
            </div>
            <div class="field">
              <input type="password" placeholder="Confirme a sua senha" required>
            </div>
            <div class="field btn">
              <div class="btn-layer"></div>
              <input type="submit" value="Signup">
            </div>
          </form>
        </div>
      </div>
    </div>
  
    

    <script src="login.js"></script>
</body>

</html>
